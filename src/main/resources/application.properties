spring.application.name=team-task-manager

# In-Memory H2 Database Connectivity (Replaced PostgreSQL/External Connection)
spring.datasource.url=jdbc:h2:mem:team_task_manager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Web Console for easy database inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8080}

# JWT Secret Key (uses JWT_SECRET env var if present, otherwise falls back to a default secure key)
jwt.secret=${JWT_SECRET:3cfa76f1c46390544cb4a81cf26a8d6e32d30dbe130a08e1694f4a39031c518b}